spring.application.name=backend
server.port=8081

# MongoDB Configuration

# Load repo-root .env (optional) when running from ./smarthub/Backend
spring.config.import=optional:file:../../.env[.properties]

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGODB_URI:${MONGO_URI:mongodb://localhost:27017/smartcampus}}}
spring.data.mongodb.auto-index-creation=true
